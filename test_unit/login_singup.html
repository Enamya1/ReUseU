<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fullscreen · monochrome auth</title>
    <!-- Inter font & Font Awesome 6 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #0b0b0b; /* almost black background */
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            /* no padding – full bleed */
        }

        /* MAIN CONTAINER – true full screen */
        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 100%;   /* prevent horizontal scroll */
            max-height: 100%;
            background: #ffffff;
            border-radius: 0;   /* edge to edge for full screen */
            box-shadow: none;    /* remove shadow for full screen (optional) */
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* both form containers – absolute, 50% width */
        .form-container {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 3rem;
            text-align: center;
            transition: 0.6s ease-in-out;
            z-index: 2;
            background: white;
        }

        /* sign in – left by default */
        .sign-in {
            left: 0;
            opacity: 1;
            transform: translateX(0);
        }

        /* sign up – hidden initially */
        .sign-up {
            left: 50%;
            opacity: 0;
            transform: translateX(20px);
            pointer-events: none;
        }

        /* when panel active -> sign in fades out, sign up fades in */
        .container.right-panel-active .sign-in {
            opacity: 0;
            transform: translateX(-20px);
            pointer-events: none;
        }

        .container.right-panel-active .sign-up {
            opacity: 1;
            transform: translateX(0);
            pointer-events: all;
            z-index: 5;
        }

        .form-container h1 {
            font-weight: 700;
            font-size: 2.8rem;  /* slightly larger for full screen */
            margin-bottom: 1.2rem;
            color: #1e1e1e;
        }

        .social-icons {
            display: flex;
            gap: 1.2rem;
            margin: 1.5rem 0;
        }

        .social-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #222;
            font-size: 1.6rem;
            transition: all 0.3s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .social-icon:hover {
            background: #000000;
            color: #ffffff;
            transform: scale(1.05);
        }

        .form-container span {
            font-size: 1rem;
            color: #777;
            margin: 0.8rem 0 0.5rem;
            font-weight: 500;
        }

        .form-container input {
            width: 100%;
            height: 54px;
            background: #f3f3f3;
            border: none;
            border-radius: 12px;
            padding: 0 1.2rem;
            margin: 0.6rem 0;
            font-size: 1rem;
            outline: none;
            transition: border 0.3s, box-shadow 0.3s;
        }

        .form-container input:focus {
            border: 2px solid #000000;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.15);
            background: white;
        }

        .forgot-link {
            width: 100%;
            text-align: right;
            font-size: 0.9rem;
            margin: 0.25rem 0 1.2rem;
        }
        .forgot-link a {
            color: #888;
            text-decoration: none;
            transition: color 0.2s;
        }
        .forgot-link a:hover {
            color: #000000;
        }

        .btn {
            width: 220px;
            height: 54px;
            border-radius: 28px;
            border: none;
            background: #000000;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            margin-top: 0.5rem;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #222222;
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.3);
        }

        /* overlay container – black sliding panel */
        .overlay-container {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            background: #000000;
            border-radius: 0;    /* no radius for full screen */
            overflow: hidden;
            transition: transform 0.6s ease-in-out;
            z-index: 10;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.2);
        }

        .container.right-panel-active .overlay-container {
            transform: translateX(-100%);
        }

        .overlay {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .overlay-left, .overlay-right {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 3rem;
            text-align: center;
            color: white;
            transition: opacity 0.4s ease-in-out;
        }

        .overlay-right {
            opacity: 1;
            z-index: 3;
        }
        .overlay-left {
            opacity: 0;
            z-index: 1;
        }

        .container.right-panel-active .overlay-right {
            opacity: 0;
            z-index: 1;
        }
        .container.right-panel-active .overlay-left {
            opacity: 1;
            z-index: 3;
        }

        .overlay h1 {
            font-size: 3.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .overlay p {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 2rem;
            opacity: 0.9;
            line-height: 1.6;
            max-width: 300px;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid white;
            color: white;
            box-shadow: none;
            width: 220px;
        }

        .btn-outline:hover {
            background: white;
            color: #000000;
            transform: scale(1.05);
            border-color: white;
        }

        /* ---------- RESPONSIVE ADJUSTMENTS (small screens) ---------- */
        @media (max-width: 768px) {
            .container {
                display: flex;
                flex-direction: column;
                height: 100vh;
                border-radius: 0;   /* keep full screen */
            }

            .form-container {
                position: relative;
                width: 100%;
                left: 0 !important;
                height: auto;
                padding: 2.5rem 2rem;
                transition: opacity 0.5s, transform 0.5s;
            }

            .sign-in {
                order: 1;
                opacity: 1;
                transform: none;
                flex: 1 0 auto;
                justify-content: center;
            }
            .sign-up {
                order: 2;
                opacity: 0;
                transform: translateY(20px);
                display: none;
                flex: 1 0 auto;
                justify-content: center;
            }

            .overlay-container {
                position: relative;
                width: 100%;
                right: auto;
                height: 280px;
                order: 3;
                border-radius: 0;
                transition: transform 0.6s ease-in-out;
                transform: translateY(0);
            }

            .container.right-panel-active .overlay-container {
                transform: translateY(-100%);
            }

            .container.right-panel-active .sign-up {
                display: flex;
                opacity: 1;
                transform: translateY(0);
            }
            .container.right-panel-active .sign-in {
                display: none;
                opacity: 0;
            }

            .overlay-left, .overlay-right {
                padding: 1.5rem;
            }

            .overlay h1 {
                font-size: 2.8rem;
            }
            .overlay p {
                font-size: 1.1rem;
                margin-bottom: 1.5rem;
            }
        }

        /* extra small devices */
        @media (max-width: 480px) {
            .form-container {
                padding: 2rem 1.2rem;
            }
            .form-container h1 {
                font-size: 2.2rem;
            }
            .social-icon {
                width: 48px;
                height: 48px;
                font-size: 1.4rem;
            }
            .btn, .btn-outline {
                width: 180px;
                height: 50px;
                font-size: 1rem;
            }
            .overlay h1 {
                font-size: 2.2rem;
            }
            .overlay p {
                font-size: 1rem;
            }
        }

        /* landscape orientation on small screens */
        @media (max-height: 600px) and (orientation: landscape) {
            .container {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .form-container {
                padding: 1.5rem 1rem;
            }
            .social-icons {
                margin: 0.5rem 0;
            }
            .overlay-container {
                height: 100%;
                width: 50%;
            }
            /* reset stacking for landscape */
            .sign-in, .sign-up {
                width: 50%;
            }
        }

        /* ensure overlay background is black */
        .overlay-container, .overlay-left, .overlay-right {
            background: #000000;
        }
        .overlay-left, .overlay-right {
            background: transparent;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container" id="container">
        <!-- SIGN IN FORM -->
        <div class="form-container sign-in">
            <h1>Sign In</h1>
            <div class="social-icons">
                <a href="#" class="social-icon"><i class="fab fa-google"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-github"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-linkedin-in"></i></a>
            </div>
            <span>Sign in with Email & Password</span>
            <input type="email" placeholder="Email" />
            <input type="password" placeholder="Password" />
            <div class="forgot-link">
                <a href="#">Forgot Password?</a>
            </div>
            <button class="btn">SIGN IN</button>
        </div>

        <!-- SIGN UP FORM -->
        <div class="form-container sign-up">
            <h1>Sign Up</h1>
            <div class="social-icons">
                <a href="#" class="social-icon"><i class="fab fa-google"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-facebook-f"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-github"></i></a>
                <a href="#" class="social-icon"><i class="fab fa-linkedin-in"></i></a>
            </div>
            <span>or use email to register</span>
            <input type="text" placeholder="Name" />
            <input type="email" placeholder="Email" />
            <input type="password" placeholder="Password" />
            <button class="btn">SIGN UP</button>
        </div>

        <!-- BLACK OVERLAY (sliding panel) -->
        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-left">
                    <h1>Hello Friend</h1>
                    <p>Already have an account? Sign in with your credentials</p>
                    <button class="btn btn-outline" id="signInBtn">SIGN IN</button>
                </div>
                <div class="overlay-right">
                    <h1>Hello World</h1>
                    <p>Enter your details and start your journey with us</p>
                    <button class="btn btn-outline" id="signUpBtn">SIGN UP</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const container = document.getElementById('container');
            const signUpButton = document.getElementById('signUpBtn');
            const signInButton = document.getElementById('signInBtn');

            signUpButton.addEventListener('click', () => {
                container.classList.add('right-panel-active');
            });

            signInButton.addEventListener('click', () => {
                container.classList.remove('right-panel-active');
            });
        })();
    </script>
</body>
</html>
