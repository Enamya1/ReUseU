<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>校物圈 · 纯粹文字标识</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;  /* 纯黑背景 */
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Helvetica, Arial, 'Noto Sans CJK SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: #FFFFFF;             /* 基础文字白色 */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 极简主容器 — 文字成为绝对主角 */
        .logo-showcase {
            max-width: 720px;
            width: 90%;
            margin: 2rem auto;
            padding: 2rem 1.5rem;
            text-align: center;
            background: transparent;    /* 透明背景，继承黑底 */
        }

        /* 文字标识核心区 */
        .wordmark {
            margin-bottom: 1.2rem;
        }

        /* 主标识 — 纯白，利落字重 */
        .brand-name {
            font-size: clamp(3rem, 12vw, 5rem);
            font-weight: 560;
            letter-spacing: -0.01em;
            color: #FFFFFF;
            line-height: 1.1;
            transition: opacity 0.2s ease;
            display: inline-block;
        }

        /* 优雅悬停微交互 */
        .brand-name:hover {
            opacity: 0.85;
        }

        /* 极简装饰分割 — 白色半透明，平衡视觉 */
        .divider {
            width: 48px;
            height: 1.5px;
            background-color: #FFFFFF;
            margin: 1.5rem auto 1rem auto;
            opacity: 0.4;
        }

        /* 品牌理念 — 浅灰白，保持可读 */
        .philosophy {
            font-size: 0.85rem;
            color: #CCCCCC;
            margin-top: 1.5rem;
            font-weight: 380;
            max-width: 320px;
            margin-left: auto;
            margin-right: auto;
            letter-spacing: 0.3px;
        }

        /* 脚注 — 深灰，柔和 */
        .footer-note {
            margin-top: 3rem;
            font-size: 0.7rem;
            color: #888888;
            border-top: 1px solid #2A2A2A;
            padding-top: 1.8rem;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            letter-spacing: 0.3px;
        }

        /* 极小屏幕适配 */
        @media (max-width: 480px) {
            .logo-showcase {
                padding: 1.5rem 1rem;
            }
            .divider {
                margin: 1.2rem auto 0.8rem auto;
            }
        }

        /* 焦点样式 (无障碍) */
        .brand-name:focus-visible {
            outline: 2px solid #FFFFFF;
            outline-offset: 6px;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="logo-showcase">
        <!-- 文字标识核心区：仅保留「校物圈」作为 logo，无英文辅助 -->
        <div class="wordmark">
            <h1 class="brand-name" tabindex="0" role="heading" aria-label="校物圈，校园物品共享平台">校物圈</h1>
        </div>

        <!-- 极细分割线，保持层次 -->
        <div class="divider"></div>

        <!-- 品牌精神简述，黑白极简 -->
        <div class="philosophy">
            纯粹 · 连接 · 校园生态
        </div>

        <!-- 简洁脚注 -->
        <div class="footer-note">
            SHARING MADE SIMPLE
        </div>
    </div>
</body>
</html>
