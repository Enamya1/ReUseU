<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>minimal glass · fullscreen · search users</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* animated background – full viewport */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: linear-gradient(-45deg, #2b2b2b, #4a4a4a, #1f1f1f, #3c3c3c);
            background-size: 400% 400%;
            animation: grainShift 12s ease infinite;
        }

        @keyframes grainShift {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }

        /* main app – fills entire screen */
        #app {
            display: flex;
            width: 100vw;
            height: 100vh;
            background: rgba(30, 30, 30, 0.4);
            backdrop-filter: blur(4px);
            border: none;
            box-shadow: none;
            overflow: hidden;
        }

        /* ---------- LEFT SIDEBAR (solid) ---------- */
        .sidebar {
            width: 320px;
            background: #111;
            border-right: 1px solid #2e2e2e;
            display: flex;
            flex-direction: column;
            color: #eee;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 24px 22px 12px;
            font-size: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #fff;
        }

        /* search input */
        .search-container {
            padding: 0 20px 16px;
        }

        #search-input {
            width: 100%;
            padding: 12px 16px;
            background: #222;
            border: 1px solid #3a3a3a;
            border-radius: 30px;
            outline: none;
            font-size: 14px;
            color: #f0f0f0;
            transition: border 0.15s;
        }

        #search-input:focus {
            border-color: #fff;
        }

        #search-input::placeholder {
            color: #777;
            font-weight: 300;
        }

        .user-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #555 #1a1a1a;
        }

        .user-list::-webkit-scrollbar {
            width: 5px;
        }
        .user-list::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        .user-list::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 10px;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            cursor: pointer;
            transition: background 0.1s;
            border-bottom: 1px solid #242424;
        }

        .user-item:hover {
            background: #262626;
        }

        .user-item.active {
            background: #333;
            border-left: 3px solid #fff;
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #fff;
            color: #0f0f0f;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 600;
            margin-right: 14px;
            flex-shrink: 0;
            box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        .user-info {
            flex: 1;
            min-width: 0;
        }

        .user-name {
            font-weight: 500;
            font-size: 16px;
            color: #f0f0f0;
            margin-bottom: 4px;
        }

        .last-message {
            font-size: 13px;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 170px;
        }

        .message-time {
            font-size: 11px;
            color: #777;
            margin-left: 8px;
            align-self: flex-start;
            white-space: nowrap;
        }

        .no-search-result {
            color: #888;
            text-align: center;
            padding: 40px 20px;
            font-size: 14px;
            font-style: italic;
        }

        /* ---------- RIGHT CHAT AREA (glass) ---------- */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(20, 20, 20, 0.2);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-left: 1px solid rgba(255,255,255,0.05);
            min-width: 0;
        }

        .chat-header {
            padding: 22px 28px;
            font-size: 18px;
            font-weight: 400;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.2);
            color: #fff;
            letter-spacing: 0.3px;
            backdrop-filter: blur(4px);
        }

        .messages {
            flex: 1;
            padding: 28px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: rgba(15, 15, 15, 0.25);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            margin: 0;
            scrollbar-width: thin;
            scrollbar-color: #6b6b6b #2a2a2a;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }
        .messages::-webkit-scrollbar-track {
            background: rgba(50,50,50,0.4);
        }
        .messages::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        .message {
            max-width: 68%;
            display: flex;
            flex-direction: column;
        }

        .message.sent {
            align-self: flex-end;
        }

        .message.received {
            align-self: flex-start;
        }

        .bubble {
            padding: 12px 18px;
            border-radius: 22px;
            font-size: 15px;
            line-height: 1.5;
            word-break: break-word;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .message.sent .bubble {
            background: #2e2e2e;
            color: #f0f0f0;
            border-bottom-right-radius: 6px;
        }

        .message.received .bubble {
            background: #1c1c1c;
            color: #e0e0e0;
            border-bottom-left-radius: 6px;
        }

        .time {
            font-size: 11px;
            color: #aaa;
            margin-top: 6px;
            padding: 0 8px;
            align-self: flex-end;
        }

        .message.received .time {
            align-self: flex-start;
        }

        /* ---------- INPUT AREA – flexible input between buttons ---------- */
        .input-area {
            display: flex;
            padding: 18px 28px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.1);
            align-items: center;
            gap: 16px;               /* space between all direct children */
        }

        .attach-container {
            position: relative;
            display: flex;
            align-items: center;
            flex-shrink: 0;           /* prevents shrinking */
        }

        .attach-button {
            background: transparent;
            color: #fff;
            border: 1px solid #5a5a5a;
            border-radius: 40px;
            width: 48px;
            height: 48px;
            font-size: 26px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .attach-button:hover {
            background: rgba(255,255,255,0.1);
            border-color: #fff;
        }

        .attach-dropdown {
            position: absolute;
            bottom: 60px;          /* above button */
            left: 0;
            background: #1e1e1e;
            border: 1px solid #3f3f3f;
            border-radius: 16px;
            padding: 8px 0;
            min-width: 150px;
            backdrop-filter: blur(16px);
            background: rgba(30,30,30,0.95);
            box-shadow: 0 -6px 20px rgba(0,0,0,0.5);
            display: none;
            flex-direction: column;
            z-index: 100;
        }

        .attach-container.show .attach-dropdown {
            display: flex;
        }

        .dropdown-item {
            background: transparent;
            border: none;
            color: #eee;
            padding: 12px 22px;
            text-align: left;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.1s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .dropdown-item:hover {
            background: #333;
        }

        .dropdown-item span {
            font-size: 22px;
        }

        /* flexible input field – takes all remaining space */
        #message-input {
            flex: 1;                 /* grow to fill space between + and send */
            min-width: 100px;         /* prevents complete collapse */
            padding: 14px 22px;
            background: rgba(20,20,20,0.7);
            border: 1px solid #3f3f3f;
            border-radius: 40px;
            outline: none;
            font-size: 15px;
            color: #fff;
            transition: border 0.15s, background 0.15s;
        }

        #message-input:focus {
            border-color: #fff;
            background: rgba(30,30,30,0.9);
        }

        #message-input::placeholder {
            color: #888;
            font-weight: 300;
        }

        /* send button – fixed width */
        #send-btn {
            background: transparent;
            color: #fff;
            border: 1px solid #5a5a5a;
            border-radius: 40px;
            padding: 12px 32px;
            font-size: 15px;
            font-weight: 400;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            backdrop-filter: blur(4px);
            white-space: nowrap;
            flex-shrink: 0;           /* stays at its own width */
        }

        #send-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: #fff;
        }

        /* empty state */
        .no-selection {
            color: #bbb;
            text-align: center;
            margin-top: 40px;
            font-size: 16px;
            background: rgba(0,0,0,0.2);
            padding: 20px;
            border-radius: 30px;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- LEFT SIDEBAR with search -->
        <div class="sidebar">
            <div class="sidebar-header">✧ conversations</div>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search users..." autocomplete="off">
            </div>
            <div class="user-list" id="user-list"></div>
        </div>

        <!-- RIGHT CHAT AREA (glass) -->
        <div class="chat">
            <div class="chat-header" id="chat-header">select a contact</div>
            <div class="messages" id="messages"></div>
            <!-- input area with flexible text field -->
            <div class="input-area" id="input-area" style="display: none;">
                <!-- attachment button + dropdown -->
                <div class="attach-container" id="attachContainer">
                    <button class="attach-button" id="attachBtn" title="attach">➕</button>
                    <div class="attach-dropdown" id="attachDropdown">
                        <button class="dropdown-item" id="dropdownImage"><span>⊞</span> Image</button>
                        <button class="dropdown-item" id="dropdownFile"><span>⌗</span> File</button>
                    </div>
                </div>

                <!-- text input – takes all remaining space -->
                <input type="text" id="message-input" placeholder="type a message..." autocomplete="off">

                <!-- send button -->
                <button id="send-btn">send</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- data ----------
            const allUsers = [
                { id: 1, name: 'Alex', avatar: 'A' },
                { id: 2, name: 'Blake', avatar: 'B' },
                { id: 3, name: 'Casey', avatar: 'C' },
                { id: 4, name: 'Drew', avatar: 'D' },
                { id: 5, name: 'Eden', avatar: 'E' },
                { id: 6, name: 'Frank', avatar: 'F' }
            ];

            const messages = {
                1: [
                    { id: 'm1', sender: 1, text: 'working on the minimal concept?', time: '11:23' },
                    { id: 'm2', sender: 'me', text: 'yes, black & white with glass', time: '11:25' },
                    { id: 'm3', sender: 1, text: 'sounds clean. send a mockup', time: '11:28' }
                ],
                2: [
                    { id: 'm4', sender: 2, text: 'did you see the new gradient?', time: '09:42' },
                    { id: 'm5', sender: 'me', text: 'it animates so smoothly', time: '09:44' }
                ],
                3: [
                    { id: 'm6', sender: 3, text: 'meeting at 4', time: 'yest' },
                    { id: 'm7', sender: 'me', text: 'got it', time: 'yest' }
                ],
                4: [],
                5: [],
                6: []
            };

            let selectedUserId = null;
            let currentSearchTerm = '';

            // DOM elements
            const userListEl = document.getElementById('user-list');
            const chatHeaderEl = document.getElementById('chat-header');
            const messagesEl = document.getElementById('messages');
            const inputAreaEl = document.getElementById('input-area');
            const messageInput = document.getElementById('message-input');
            const sendBtn = document.getElementById('send-btn');
            const searchInput = document.getElementById('search-input');

            // dropdown elements
            const attachContainer = document.getElementById('attachContainer');
            const attachBtn = document.getElementById('attachBtn');
            const attachDropdown = document.getElementById('attachDropdown');
            const dropdownImage = document.getElementById('dropdownImage');
            const dropdownFile = document.getElementById('dropdownFile');

            // close dropdown when clicking outside
            function closeDropdown(e) {
                if (!attachContainer.contains(e.target)) {
                    attachContainer.classList.remove('show');
                }
            }

            attachBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                attachContainer.classList.toggle('show');
            });

            attachDropdown.addEventListener('click', (e) => e.stopPropagation());
            window.addEventListener('click', closeDropdown);

            // ---------- helper: filter users by search term ----------
            function getFilteredUsers() {
                if (!currentSearchTerm.trim()) return allUsers;
                const term = currentSearchTerm.trim().toLowerCase();
                return allUsers.filter(user => user.name.toLowerCase().includes(term));
            }

            // ---------- render user list (based on filtered) ----------
            function renderUserList(activeId) {
                const filtered = getFilteredUsers();
                if (filtered.length === 0) {
                    userListEl.innerHTML = '<div class="no-search-result">no users found</div>';
                    return;
                }

                let html = '';
                filtered.forEach(user => {
                    const last = getLastMessageForUser(user.id);
                    const activeClass = (user.id === activeId) ? 'active' : '';
                    html += `
                        <div class="user-item ${activeClass}" data-id="${user.id}">
                            <div class="avatar">${user.avatar}</div>
                            <div class="user-info">
                                <div class="user-name">${user.name}</div>
                                <div class="last-message">${escapeHtml(last.text)}</div>
                            </div>
                            <div class="message-time">${last.time}</div>
                        </div>
                    `;
                });
                userListEl.innerHTML = html;
            }

            // ---------- check if selected user is still in filtered list, if not, deselect ----------
            function validateSelectedUser() {
                if (selectedUserId === null) return;
                const filteredIds = getFilteredUsers().map(u => u.id);
                if (!filteredIds.includes(selectedUserId)) {
                    // Deselect
                    selectedUserId = null;
                    chatHeaderEl.textContent = 'select a contact';
                    messagesEl.innerHTML = '<div class="no-selection">◀︎ choose a friend from the sidebar</div>';
                    inputAreaEl.style.display = 'none';
                }
            }

            // ---------- get last message (unchanged) ----------
            function getLastMessageForUser(userId) {
                const userMessages = messages[userId];
                if (userMessages && userMessages.length > 0) {
                    const last = userMessages[userMessages.length - 1];
                    return { text: last.text, time: last.time };
                }
                return { text: '— no messages', time: '' };
            }

            function escapeHtml(unsafe) {
                return unsafe.replace(/[&<>"]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    if (m === '"') return '&quot;';
                    return m;
                });
            }

            // ---------- render messages (unchanged) ----------
            function renderMessages(userId) {
                if (!userId) return;
                const userMessages = messages[userId] || [];
                if (userMessages.length === 0) {
                    messagesEl.innerHTML = '<div style="color:#bbb; text-align:center; margin-top:40px; background:rgba(0,0,0,0.2); padding:20px; border-radius:28px;">✧ no messages yet. start the conversation.</div>';
                    return;
                }

                let html = '';
                userMessages.forEach(msg => {
                    const msgClass = (msg.sender === 'me') ? 'sent' : 'received';
                    html += `
                        <div class="message ${msgClass}">
                            <div class="bubble">${escapeHtml(msg.text)}</div>
                            <div class="time">${msg.time}</div>
                        </div>
                    `;
                });
                messagesEl.innerHTML = html;
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }

            function updateChatHeader(userId) {
                const user = allUsers.find(u => u.id === userId);
                chatHeaderEl.textContent = user ? user.name : 'select a contact';
            }

            function selectUser(userId) {
                if (selectedUserId === userId) return;
                selectedUserId = userId;
                renderUserList(selectedUserId);
                updateChatHeader(selectedUserId);
                renderMessages(selectedUserId);
                inputAreaEl.style.display = 'flex';
                messageInput.focus();
            }

            function sendTextMessage() {
                if (!selectedUserId) {
                    alert('pick a contact first');
                    return;
                }
                const text = messageInput.value.trim();
                if (text === '') return;

                const newMsg = {
                    id: 'msg_' + Date.now() + Math.random(),
                    sender: 'me',
                    text: text,
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                };

                if (!messages[selectedUserId]) {
                    messages[selectedUserId] = [];
                }
                messages[selectedUserId].push(newMsg);
                messageInput.value = '';

                renderMessages(selectedUserId);
                renderUserList(selectedUserId);
            }

            function sendFileSimulate(acceptType, icon) {
                if (!selectedUserId) {
                    alert('select a user first');
                    return;
                }
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = acceptType;
                fileInput.style.display = 'none';
                document.body.appendChild(fileInput);

                fileInput.onchange = function(e) {
                    const file = e.target.files[0];
                    if (file) {
                        let fileName = file.name;
                        if (fileName.length > 24) {
                            fileName = fileName.slice(0, 18) + '…' + fileName.slice(-5);
                        }
                        const displayText = `${icon} ${fileName}`;
                        const newMsg = {
                            id: 'msg_' + Date.now() + Math.random(),
                            sender: 'me',
                            text: displayText,
                            time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                        };
                        if (!messages[selectedUserId]) {
                            messages[selectedUserId] = [];
                        }
                        messages[selectedUserId].push(newMsg);
                        renderMessages(selectedUserId);
                        renderUserList(selectedUserId);
                    }
                    document.body.removeChild(fileInput);
                };
                fileInput.click();
            }

            // ---------- search input handler ----------
            searchInput.addEventListener('input', (e) => {
                currentSearchTerm = e.target.value;
                validateSelectedUser();           // deselect if active user hidden
                renderUserList(selectedUserId);    // re-render list (active may be null)
            });

            // ---------- user list click (delegation) ----------
            userListEl.addEventListener('click', (e) => {
                const userItem = e.target.closest('.user-item');
                if (userItem) {
                    const userId = parseInt(userItem.dataset.id);
                    selectUser(userId);
                    attachContainer.classList.remove('show'); // close dropdown
                }
            });

            sendBtn.addEventListener('click', sendTextMessage);
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    sendTextMessage();
                }
            });

            dropdownImage.addEventListener('click', () => {
                sendFileSimulate('image/*', '⊞');
                attachContainer.classList.remove('show');
            });

            dropdownFile.addEventListener('click', () => {
                sendFileSimulate('*/*', '⌗');
                attachContainer.classList.remove('show');
            });

            // ---------- initial render ----------
            // start with first user (if any)
            if (allUsers.length > 0) {
                selectUser(allUsers[0].id);
            } else {
                inputAreaEl.style.display = 'none';
                chatHeaderEl.textContent = 'no contacts';
            }
        })();
    </script>
</body>
</html>
