<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Navbar Prototype</title>

<!-- Icons -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #a855f7, #9333ea);
    font-family: Arial, sans-serif;
  }

  .phone {
    width: 320px;
    height: 600px;
    background: #f5f5f5;
    border-radius: 30px;
    padding: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
  }

  .nav {
    background: #0f0f1a;
    border-radius: 30px;
    padding: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .nav-item {
    color: #aaa;
    font-size: 18px;
    width: 40px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
  }

  .nav-item:hover {
    color: white;
  }

  .active {
    background: white;
    color: black;
    padding: 8px 14px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
  }

  .active i {
    font-size: 14px;
  }

</style>
</head>

<body>

<div class="phone">
  
  <div class="nav">
    <div class="active"><i class="fas fa-home"></i> Home</div>
    <div class="nav-item"><i class="fas fa-search"></i>test </div>
    <div class="nav-item"><i class="fas fa-percent"></i></div>
    <div class="nav-item"><i class="fas fa-shopping-cart"></i></div>
    <div class="nav-item"><i class="fas fa-user"></i></div>
  </div>

</div>

</body>
</html>
