<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>momentum loader · pure white on black</title>
  <style>
    /* reset + full black canvas */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #000000;      /* solid black background */
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== MOMENTUM LOADER – pure CSS ===== */
    .momentum {
      /* custom properties: size 90px, speed 0.50s, white circles */
      --uib-size: 90px;
      --uib-speed: 0.50s;
      --uib-color: #ffffff;     /* pure white effect */
      
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      height: var(--uib-size);
      width: var(--uib-size);
      animation: rotate01561 var(--uib-speed) linear infinite;
    }

    .momentum::before,
    .momentum::after {
      content: '';
      height: 25%;
      width: 25%;
      border-radius: 50%;
      background-color: var(--uib-color);
    }

    .momentum::before {
      animation: wobble290123 calc(var(--uib-speed) * 1.25) ease-in-out infinite;
      margin-right: 10%;
    }

    .momentum::after {
      animation: wobble9123 calc(var(--uib-speed) * 1.25) ease-in-out infinite;
    }

    /* keyframes – original wobble + rotation */
    @keyframes wobble9123 {
      0%, 100% {
        transform: translateX(0);
      }
      50% {
        transform: translateX(calc(var(--uib-size) * 0.2)) scale(1.1);
      }
    }

    @keyframes wobble290123 {
      0%, 100% {
        transform: translateX(0);
      }
      50% {
        transform: translateX(calc(var(--uib-size) * -0.2)) scale(1.1);
      }
    }

    @keyframes rotate01561 {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</head>
<body>
  <!-- only the loading animation – no extra elements -->
  <div class="momentum"></div>
</body>
</html>
